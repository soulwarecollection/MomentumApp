name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Flutter analyze & test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed/drift/injectable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Test
        run: flutter test

  server:
    name: Server build, lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: momentum
          POSTGRES_PASSWORD: momentum
          POSTGRES_DB: momentum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U momentum"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://momentum:momentum@localhost:5432/momentum?schema=public
      DATABASE_URL_TEST: postgresql://momentum:momentum@localhost:5432/momentum_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-not-for-production-use-only
      JWT_REFRESH_SECRET: ci-refresh-secret-not-for-production-use-only
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test database
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=momentum psql -h localhost -U momentum -d postgres -c "CREATE DATABASE momentum_test;"

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: e2e tests
        run: npm run test:e2e
