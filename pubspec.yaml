name: momentum
description: A modality-agnostic workout logger — fast, private, frictionless.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_local_notifications: ^22.0.1
  flutter_secure_storage: ^9.2.4
  flutter_timezone: ^5.1.0
  fpdart: ^1.2.0
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.3.0
  injectable: ^3.0.0
  intl: ^0.20.2
  json_annotation: ^4.12.0
  phosphor_flutter: ^2.1.0
  purchases_flutter: ^10.3.0
  shared_preferences: ^2.5.5
  timezone: ^0.11.0
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  injectable_generator: ^3.0.2
  integration_test:
    sdk: flutter
  json_serializable: ^6.14.0
  mocktail: ^1.0.5
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf
          weight: 100
        - asset: assets/fonts/Inter.ttf
          weight: 200
        - asset: assets/fonts/Inter.ttf
          weight: 300
        - asset: assets/fonts/Inter.ttf
          weight: 400
        - asset: assets/fonts/Inter.ttf
          weight: 500
        - asset: assets/fonts/Inter.ttf
          weight: 600
        - asset: assets/fonts/Inter.ttf
          weight: 700
        - asset: assets/fonts/Inter.ttf
          weight: 800
        - asset: assets/fonts/Inter.ttf
          weight: 900
    - family: Space Grotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk.ttf
          weight: 300
        - asset: assets/fonts/SpaceGrotesk.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk.ttf
          weight: 700
